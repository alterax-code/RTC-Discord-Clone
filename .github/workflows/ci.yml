name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check
        working-directory: server

      - name: Build
        run: cargo build
        working-directory: server

      - name: Test
        run: cargo test
        working-directory: server

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --out Html --output-dir . --ignore-tests
        working-directory: server
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/tarpaulin-report.html
        if: always()

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: client

      - name: Zip frontend
        run: zip -r frontend-build.zip client/.next client/public client/package.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Build backend
        run: cargo build --release
        working-directory: server

      - name: Zip backend
        run: zip -r backend-build.zip server/target/release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            frontend-build.zip
            backend-build.zip
          generate_release_notes: true
