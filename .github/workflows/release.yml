name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: cd client && npm ci

      - name: Builder le frontend
        run: cd client && npm run build

      - name: Zipper le build
        run: zip -r frontend-build.zip client/.next client/public client/package.json

      - name: Uploader l'artefact frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-build.zip

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4

      - name: Installer Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Builder le backend
        run: cargo build --release

      - name: Zipper le binaire
        run: zip -r backend-build.zip target/release/

      - name: Uploader l'artefact backend
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend-build.zip

  create-release:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - name: Télécharger artefact frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build

      - name: Télécharger artefact backend
        uses: actions/download-artifact@v4
        with:
          name: backend-build

      - name: Créer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend-build.zip
            backend-build.zip
          generate_release_notes: true
